    <style>
        :root {

            --text-dark: #0f172a;
            --bg-light: #f8fafc;

        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.7;
            color: var (--text-main);
            background-color: var (--bg-light);
            margin: 0;
            padding: 0;

            background: var (--card-bg);
            border: 1 px solid var (--border);

    <div id="policy-bn" class="policy-card">
        <h1>গোপনীয়তা নীতি (Privacy Policy)</h1>
        <p class="last-updated">সর্বশেষ পরিমার্জন: জুলাই ২০২৬</p>
        
        <p><strong>MRIS PDF</strong>-এ আমরা আপনার তথ্যের গোপনীয়তাকে সর্বোচ্চ অগ্রাধিকার দিই। আপনার ব্যক্তিগত তথ্যের নিরাপত্তা নিশ্চিত করতে আমাদের পুরো অ্যাপ্লিকেশনটি একটি স্বচ্ছ এবং নিরাপদ অবকাঠামোতে কাজ করে। এই নীতিটি <strong>MRIS Terms</strong>-এর পক্ষ থেকে পরিচালনা করা হচ্ছে। আমাদের অ্যাপ্লিকেশনটি আপনার ডেটা কীভাবে পরিচালনা করে এবং কেন সুনির্দিষ্ট কিছু পারমিশন ব্যবহার করে, তা নিচে বিস্তারিত দেওয়া হলো:</p>

        <h3>১. সম্পূর্ণ সার্ভারহীন অবকাঠামো ও局部 স্টোরেজ</h3>
        <ul>
            <li><strong>সার্ভারমুক্ত পলিসি:</strong> আমরা একটি কঠোর জিরো-সার্ভার (Zero-Server) নীতি মেনে চলি। আপনার প্রসেস করা কোনো পিডিএফ ডকুমেন্ট, ক্যামেরা দিয়ে তোলা ছবি, ভেতরের টেক্সট বা আপনার ব্যবহারের ইতিহাস আমরা কোনো অনলাইন ক্লাউড সার্ভারে সংগ্রহ, ট্র্যাক বা আপলোড করি না।</li>
            <li><strong>ডিভাইস নিরাপত্তা:</strong> ফাইলের সমস্ত প্রসেসিং সম্পূর্ণভাবে আপনার ডিভাইসের নিজস্ব সুরক্ষিত স্যান্ডবক্স মেমোরিতে (Locally) সম্পন্ন হয়। অ্যাপের ডেটা ক্লিয়ার করলে বা অ্যাপটি আনইন্সটল করলে সমস্ত তথ্য চিরতরে মুছে যাবে।</li>
        </ul>

        <h3>২. প্রয়োজনীয় পারমিশনসমূহ এবং তাদের ব্যবহারের উদ্দেশ্য</h3>
        <p>অ্যাপের মূল কাজগুলো সঠিকভাবে পরিচালনা করার জন্য এটি অত্যন্ত সীমিত এবং সুনির্দিষ্ট কিছু অ্যান্ড্রয়েড পারমিশন ব্যবহার করে। এই অনুমতিগুলো শুধুমাত্র লোকাল ফিচারের জন্য ব্যবহৃত হয়:</p>
        <ul>
            <li><strong>ফাইল এবং স্টোরেজ অ্যাক্সেস পারমিশন (File & Storage Access):</strong> আপনার স্মার্টফোনের ইন্টারনাল স্টোরেজ থেকে পিডিএফ এবং মিডিয়া ফাইলগুলো লোড করা, স্ক্যান করা, পরিবর্তন করা, কনভার্ট করা এবং পুনরায় নিরাপদে সেভ করার জন্য এই অনুমতি অপরিহার্য।</li>
            <li><strong>ক্যামেরা পারমিশন (Camera Permission):</strong> ইন-অ্যাপ স্ক্যানার টুলের মাধ্যমে যেকোনো কাগজের নথি, রসিদ বা নোটের স্পষ্ট ছবি তুলে সেগুলোকে সরাসরি ডিজিটাল পিডিএফ ডকুমেন্টে রূপান্তর করার জন্য এই অনুমতির প্রয়োজন হয়।</li>
            <li><strong>নোটিফিকেশন পারমিশন (Notification Permission - Android 13+):</strong> ব্যাকগ্রাউন্ডে বড় কোনো ফাইল কনভার্ট বা কম্প্রেস করার কাজ সম্পন্ন হলে ব্যবহারকারীকে রিয়াল-টাইম সিস্টেম অ্যালার্ট এবং প্রোগ্রেস আপডেট দেখানোর জন্য এই অনুমতিটি অত্যন্ত জরুরি।</li>
        </ul>

        <h3>৩. ঐচ্ছিক ক্লাউড ব্যাকআপ (Firebase Cloud Backup)</h3>
        <div class="highlight-box">
            <strong>ফায়ারবেস ব্যাকআপ সুবিধা:</strong> ব্যবহারকারী চাইলে তার নিজস্ব সুরক্ষার জন্য অ্যাপের সেটিংস থেকে নিজের গুগল/জিমেইল (Gmail) অ্যাকাউন্ট দিয়ে সাইন-ইন করে <strong>Firebase</strong> সার্ভারে তার প্রয়োজনীয় ডেটা ব্যাকআপ রাখতে পারবেন। এই ডেটা সম্পূর্ণ এনক্রিপ্টেড অবস্থায় ব্যবহারকারীর নিজস্ব নিয়ন্ত্রণে থাকবে এবং <strong>MRIS Terms</strong> ডেভলপমেন্ট বা কোনো তৃতীয় পক্ষ এই ব্যাকআপ ডেটা অ্যাক্সেস করতে পারবে না।
        </div>

        <h3>৪. কাস্টমার সাপোর্ট এবং যোগাযোগ সুরক্ষা</h3>
        <ul>
            <li><strong>তথ্য সুরক্ষা:</strong> অ্যাপের যেকোনো সমস্যা বা মতামতের জন্য আমাদের অফিশিয়াল ইমেইল আইডি (<strong> contact.mrisll@gmail.com </strong>)-এর মাধ্যমে আমাদের সাথে যোগাযোগ করা হলে, সেই যোগাযোগ অত্যন্ত গোপনীয় রাখা হয়।</li>
            <li><strong>তৃতীয় পক্ষের কাছে ডেটা শেয়ার না করা:</strong> ইমেইলের মাধ্যমে শেয়ার করা তথ্যগুলো শুধুমাত্র আপনাকে ওয়ান-টু-ওয়ান কাস্টমার সাপোর্ট বা বাগ (Bug) ফিক্সিংয়ের কাজে ব্যবহার করা হয় এবং তা কোনো বাণিজ্যিক উদ্দেশ্যে কখনোই কোনো তৃতীয় পক্ষের (Third-party) কাছে বিক্রি বা হস্তান্তর করা হয় না।</li>
        </ul>

    <!-- English Privacy Policy -->
    <div id="policy-en" class="policy-card hidden">
        <h1>Privacy Policy (MRIS PDF)</h1>
        <p class="last-updated">Last Updated: July 2026</p>
        
        <p>At <strong>MRIS PDF</strong>, user privacy is paramount. Provided and governed by <strong>MRIS Terms</strong>, our data ecosystem functions under a transparent, serverless architecture to protect your personal integrity. This Privacy Policy outlines how our application collects, uses, and safeguards your information and handles system permissions.</p>

        <h3>1. Complete Serverless Architecture & Local Storage</h3>
        <ul>
            <li><strong>Zero-Server Infrastructure:</strong> We enforce a strict zero-server policy. We do <strong> no</strong> host external cloud databases to collect, extract, intercept, monitor, or upload your processed PDF documents, captured camera images, extracted texts, or private user behavior logs.</li>
            <li><strong>Local Processing:</strong> Every file modification, rendering sequence, or conversion happens strictly within your device's localized secure sandbox environment. Uninstalling or clearing the app data permanently and irreversibly deletes all configurations and records.</li>
        </ul>

        <h3>2. Device Permissions Required & Their Purpose</h3>
        <p>To deliver its core document utilities, the application requests specific hardware and operating system permissions. These permissions are used strictly for localized functionalities:</p>
        <ul>
            <li><strong>File and Storage Access Permission:</strong> Essential for loading, scanning, modifying, converting, and securely saving PDF and media assets locally within your smartphone's storage environment.</li>
            <li><strong>Camera Permission:</strong> Required to capture high-resolution images of physical paper documents, receipts, or notes directly through the in-app scanner component to dynamically convert them into digital PDF files.</li>
            <li><strong>Notification Permission (Android 13+):</strong> Critical for providing real-time system tray alerts, completion flags, and progress updates for heavy background processing routines, such as bulk PDF conversions or large file compressions.</li>
        </ul>

        <h3>3. Optional Cloud Backup (Firebase Cloud Backup)</h3>
        <div class="highlight-box">
            <strong>Firebase Backup Feature:</strong> For data preservation, users may optionally choose to sign in with their Google/Gmail account to store encrypted file backups securely using <strong>Firebase</strong>. This backed-up dataset remains exclusively tied to the user's personal identity and cannot be accessed or viewed by <strong>MRIS Terms</strong> or any third-party entity.
        </div>

        <h3>4. Customer Support Protection</h3>
        <ul>
            <li><strong>Data Safeguard:</strong> Any interactive technical inquiries or bug reports routed directly to our designated customer support desk via <strong>contact.mrisllc@gmail.com</strong> are preserved with absolute confidentiality.</li>
            <li><strong>No Third-Party Sharing:</strong> Information transmitted within these inquiries is strictly used to troubleshoot technical challenges on a precise one-on-one basis and will never be shared, leased, or sold to third-party advertising or analytics networks.</li>
        </ul>
    </div>

<script>
    function switchLang(lang) {
        const buttons = document.querySelectorAll('.btn-lang');
        buttons.forEach(btn => btn.classList.remove('active'));
        
        if(lang === 'bn') {
            document.getElementById('policy-bn').classList.remove('hidden');
            document.getElementById('policy-en').classList.add('hidden');
            event.target.classList.add('active');
        } else {
            document.getElementById('policy-en').classList.remove('hidden');
            document.getElementById('policy-bn').classList.add('hidden');
            event.target.classList.add('active');
        }
    }
</script>
